<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <title>Cell Arena — One-File Agar-Style Game</title>
  <style>
    :root {
      --bg:#f4f7fb;
      --hud:#0f172acc;
      --text:#ecf3ff;
      --accent:#60a5fa;
      --accent2:#34d399;
      --danger:#f43f5e;
      --line:#dbe7ff;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; height:100%; overflow:hidden; background:var(--bg); font-family:Inter,system-ui,-apple-system,sans-serif; }
    body { touch-action:none; }
    #game { width:100vw; height:100vh; display:block; }
    .hud {
      position:fixed; left:12px; top:12px; z-index:5; color:var(--text); background:var(--hud);
      border-radius:14px; padding:10px 12px; min-width:190px; box-shadow:0 10px 30px #00000033;
      backdrop-filter: blur(8px);
    }
    .hud h1{ margin:0 0 4px; font-size:15px; font-weight:700; }
    .hud p{ margin:2px 0; font-size:13px; }
    .tip { opacity:.82; max-width:220px; }
    .leaderboard {
      position:fixed; right:12px; top:12px; z-index:5; color:var(--text); background:var(--hud);
      border-radius:14px; padding:10px 12px; min-width:180px; box-shadow:0 10px 30px #00000033;
    }
    .leaderboard h2 { margin:0 0 6px; font-size:14px; }
    .leaderboard ol { margin:0; padding-left:18px; font-size:12px; }
    .controls {
      position:fixed; left:0; right:0; bottom:0; z-index:6;
      display:flex; justify-content:space-between; align-items:flex-end; padding:14px calc(10px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
      pointer-events:none;
    }
    #stick {
      width:132px; height:132px; border-radius:50%; background:#0f172a55; border:2px solid #ffffff55;
      position:relative; pointer-events:auto;
      touch-action:none;
    }
    #knob {
      position:absolute; left:50%; top:50%; width:56px; height:56px; transform:translate(-50%,-50%);
      border-radius:50%; background:linear-gradient(135deg,var(--accent),#3b82f6); box-shadow:0 6px 16px #00000055;
    }
    .actions { display:flex; gap:10px; pointer-events:auto; }
    button {
      border:none; color:#fff; font-weight:700; border-radius:12px; padding:14px 16px; min-width:86px;
      box-shadow:0 8px 20px #00000044; font-size:14px;
    }
    #splitBtn { background:linear-gradient(135deg,var(--accent2),#10b981); }
    #ejectBtn { background:linear-gradient(135deg,var(--danger),#e11d48); }
    #restartBtn { background:linear-gradient(135deg,#818cf8,#6366f1); margin-top:8px; width:100%; }
    .overlay {
      position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:10; background:#02061799;
    }
    .panel { background:#0f172aee; color:var(--text); width:min(380px,92vw); border-radius:16px; padding:18px; }
    .panel h3 { margin:0 0 8px; }
    .panel p { margin:6px 0; color:#cdd8ef; }

    @media (max-width: 780px) {
      .hud {
        top: calc(8px + env(safe-area-inset-top));
        left: calc(8px + env(safe-area-inset-left));
        min-width: 0;
        width: min(56vw, 220px);
        padding: 8px 10px;
      }
      .leaderboard {
        top: calc(8px + env(safe-area-inset-top));
        right: calc(8px + env(safe-area-inset-right));
        min-width: 0;
        width: min(40vw, 165px);
        padding: 8px 10px;
      }
      .hud p, .leaderboard ol { font-size: 11px; }
      .tip { display: none; }
      #stick { width: 116px; height: 116px; }
      #knob { width: 50px; height: 50px; }
      button { min-width: 76px; padding: 12px 12px; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <h1>Cell Arena</h1>
    <p>Mass: <b id="mass">10</b></p>
    <p>Rank: <b id="rank">-</b></p>
    <p>Best: <b id="best">10</b></p>
    <p class="tip">Move with joystick. Split for attacks. Eject mass to bait or feed.</p>
  </div>

  <aside class="leaderboard">
    <h2>Leaderboard</h2>
    <ol id="board"></ol>
  </aside>

  <div class="controls">
    <div id="stick"><div id="knob"></div></div>
    <div class="actions">
      <button id="splitBtn">Split</button>
      <button id="ejectBtn">Eject</button>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div class="panel">
      <h3>Game Over</h3>
      <p id="final"></p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <script>
    const WORLD = 4200;
    const FOOD_COUNT = 900;
    const BOT_COUNT = 16;
    const VIRUS_COUNT = 22;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const massEl = document.getElementById('mass');
    const rankEl = document.getElementById('rank');
    const bestEl = document.getElementById('best');
    const boardEl = document.getElementById('board');
    const overlay = document.getElementById('overlay');
    const finalEl = document.getElementById('final');

    const rand = (a,b)=>Math.random()*(b-a)+a;
    const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
    const dist = (a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
    const radiusFromMass = m => Math.sqrt(m) * 4;

    let best = Number(localStorage.getItem('cellarena_best') || 10);
    bestEl.textContent = Math.floor(best);

    let stick = {active:false,id:null,cx:0,cy:0,dx:0,dy:0};
    const stickEl = document.getElementById('stick');
    const knob = document.getElementById('knob');

    let foods, viruses, pellets, player, bots, over, last, cam = {x:0,y:0,zoom:1};

    function createCell(name, x, y, mass, color, human=false){
      return {
        name, color, human,
        pieces:[{x,y,mass,vx:0,vy:0,merge:0}],
        target:{x:0,y:0},
        splitCd:0,
        ejectCd:0,
        aiTimer:0,
      };
    }

    function resetGame(){
      foods = Array.from({length:FOOD_COUNT}, ()=>({x:rand(30,WORLD-30), y:rand(30,WORLD-30), mass:1, color:`hsl(${rand(0,360)} 85% 65%)`}));
      viruses = Array.from({length:VIRUS_COUNT}, ()=>({x:rand(100,WORLD-100),y:rand(100,WORLD-100),r:44}));
      pellets = [];
      player = createCell('You', WORLD/2, WORLD/2, 10, '#3b82f6', true);
      bots = Array.from({length:BOT_COUNT}, (_,i)=>createCell(`Bot ${i+1}`, rand(100,WORLD-100), rand(100,WORLD-100), rand(9,24), `hsl(${rand(0,360)} 75% 60%)`));
      over = false;
      cam.x = WORLD / 2;
      cam.y = WORLD / 2;
      cam.zoom = 1;
      overlay.style.display = 'none';
      last = performance.now();
      requestAnimationFrame(loop);
    }

    function getTotalMass(c){ return c.pieces.reduce((s,p)=>s+p.mass,0); }

    function getMainPiece(cell){
      if (!cell.pieces.length) return null;
      return cell.pieces.reduce((largest, piece) => piece.mass > largest.mass ? piece : largest, cell.pieces[0]);
    }

    function splitCell(cell){
      if (cell.splitCd > 0 || cell.pieces.length >= 16) return;
      let added = [];
      for (const p of cell.pieces) {
        if (p.mass < 18) continue;
        p.mass *= 0.5;
        const ang = Math.atan2(cell.target.y - p.y, cell.target.x - p.x);
        added.push({x:p.x + Math.cos(ang)*radiusFromMass(p.mass), y:p.y + Math.sin(ang)*radiusFromMass(p.mass), mass:p.mass, vx:Math.cos(ang)*480, vy:Math.sin(ang)*480, merge:7});
      }
      cell.pieces.push(...added);
      cell.splitCd = 1;
    }

    function ejectMass(cell){
      if (cell.ejectCd > 0) return;
      for (const p of cell.pieces) {
        if (p.mass < 20) continue;
        p.mass -= 0.7;
        const ang = Math.atan2(cell.target.y - p.y, cell.target.x - p.x);
        pellets.push({x:p.x + Math.cos(ang)*(radiusFromMass(p.mass)+8), y:p.y + Math.sin(ang)*(radiusFromMass(p.mass)+8), mass:0.7, vx:Math.cos(ang)*560, vy:Math.sin(ang)*560, life:5, color:'#f472b6'});
      }
      cell.ejectCd = 0.18;
    }

    function stepCell(cell, dt){
      cell.splitCd = Math.max(0, cell.splitCd - dt);
      cell.ejectCd = Math.max(0, cell.ejectCd - dt);
      for (const p of cell.pieces) {
        const r = radiusFromMass(p.mass);
        const speed = 210 / Math.pow(p.mass, 0.33);
        const ang = Math.atan2(cell.target.y - p.y, cell.target.x - p.x);
        p.vx += Math.cos(ang) * speed * dt;
        p.vy += Math.sin(ang) * speed * dt;
        p.vx *= 0.90;
        p.vy *= 0.90;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.x = clamp(p.x, r, WORLD-r);
        p.y = clamp(p.y, r, WORLD-r);
        p.mass = Math.max(9, p.mass - dt*0.012);
        p.merge = Math.max(0, p.merge-dt);
      }
      if (cell.pieces.length > 1) {
        for (let i=0;i<cell.pieces.length;i++){
          for (let j=i+1;j<cell.pieces.length;j++){
            const a=cell.pieces[i], b=cell.pieces[j];
            if (a.merge>0||b.merge>0) continue;
            const d=dist(a,b), rr=radiusFromMass(a.mass)+radiusFromMass(b.mass);
            if (d < rr*0.4){
              a.mass += b.mass;
              cell.pieces.splice(j,1); j--;
            }
          }
        }
      }
    }

    function stepBots(dt){
      const targets=[...bots, player].flatMap(c=>c.pieces.map(p=>({owner:c,p})));
      for (const bot of bots){
        bot.aiTimer -= dt;
        if (bot.aiTimer <= 0){
          bot.aiTimer = rand(0.2, 0.5);
          const main = getMainPiece(bot);
          if (!main) continue;
          let bestT = null;
          for (const t of targets){
            if (t.owner===bot) continue;
            const d=dist(main,t.p);
            const canEat = main.mass > t.p.mass*1.22;
            if (canEat && d<700 && (!bestT || d < bestT.d)) bestT = {x:t.p.x,y:t.p.y,d,mode:'hunt'};
            const danger = t.p.mass > main.mass*1.22;
            if (danger && d<420) { bestT = {x: main.x-(t.p.x-main.x), y: main.y-(t.p.y-main.y), d:0, mode:'flee'}; break; }
          }
          if (!bestT){
            const f=foods[(Math.random()*foods.length)|0];
            bestT = f ? {x:f.x,y:f.y,mode:'food'} : {x:rand(0,WORLD),y:rand(0,WORLD),mode:'wander'};
          }
          bot.target = bestT;
          const total = getTotalMass(bot);
          if (bot.target.mode==='hunt' && total>34 && Math.random()<0.25) splitCell(bot);
          if (total>26 && Math.random()<0.12) ejectMass(bot);
        }
        stepCell(bot, dt);
      }
    }

    function eatPhase(){
      const actors = [player, ...bots].filter(c=>c.pieces.length);
      for (const c of actors){
        for (const p of c.pieces){
          const pr = radiusFromMass(p.mass);
          for (let i=foods.length-1;i>=0;i--){
            const f=foods[i];
            if (Math.hypot(p.x-f.x,p.y-f.y) < pr){ p.mass += f.mass; foods.splice(i,1); foods.push({x:rand(30,WORLD-30), y:rand(30,WORLD-30), mass:1, color:`hsl(${rand(0,360)} 85% 65%)`}); }
          }
          for (let i=pellets.length-1;i>=0;i--){
            const e=pellets[i];
            if (Math.hypot(p.x-e.x,p.y-e.y) < pr){ p.mass += e.mass; pellets.splice(i,1); }
          }
        }
      }
      for (let i=0;i<actors.length;i++){
        for (let j=0;j<actors.length;j++){
          if (i===j) continue;
          const A=actors[i], B=actors[j];
          for (const a of A.pieces){
            for (let bi=B.pieces.length-1; bi>=0; bi--){
              const b=B.pieces[bi];
              const d=dist(a,b);
              if (a.mass > b.mass*1.15 && d < radiusFromMass(a.mass)-radiusFromMass(b.mass)*0.35){
                a.mass += b.mass*0.95;
                B.pieces.splice(bi,1);
              }
            }
          }
        }
      }

      for (const c of [player,...bots]){
        for (let i=c.pieces.length-1;i>=0;i--){
          const p=c.pieces[i];
          for (const v of viruses){
            if (dist(p,v) < radiusFromMass(p.mass)+v.r*0.72 && p.mass > 42 && c.pieces.length < 16){
              const count = Math.min(8, 16-c.pieces.length);
              const part = p.mass/(count+1);
              p.mass = part;
              for (let k=0;k<count;k++){
                const a=Math.PI*2*(k/count)+rand(-0.2,0.2);
                c.pieces.push({x:p.x+Math.cos(a)*20,y:p.y+Math.sin(a)*20,mass:part,vx:Math.cos(a)*420,vy:Math.sin(a)*420,merge:9});
              }
              break;
            }
          }
        }
      }
    }

    function stepPellets(dt){
      for (let i=pellets.length-1;i>=0;i--){
        const p=pellets[i];
        p.x += p.vx*dt; p.y += p.vy*dt;
        p.vx *= 0.94; p.vy *= 0.94;
        p.life -= dt;
        p.x = clamp(p.x,4,WORLD-4); p.y = clamp(p.y,4,WORLD-4);
        if (p.life <= 0) pellets.splice(i,1);
      }
    }

    function updatePlayerTarget(){
      const main = getMainPiece(player);
      if (!main) return;
      const mag = Math.hypot(stick.dx, stick.dy);
      if (mag < 0.001){ player.target.x = main.x; player.target.y = main.y; return; }
      player.target.x = main.x + stick.dx * 500;
      player.target.y = main.y + stick.dy * 500;
    }

    function computeCamera(){
      if (!player.pieces.length) return;
      const main = getMainPiece(player);
      if (!main) return;
      let cx=0,cy=0,tm=0;
      for (const p of player.pieces){ cx += p.x*p.mass; cy += p.y*p.mass; tm += p.mass; }
      const centerX = cx / tm;
      const centerY = cy / tm;
      cam.x += ((main.x * 0.75 + centerX * 0.25) - cam.x) * 0.22;
      cam.y += ((main.y * 0.75 + centerY * 0.25) - cam.y) * 0.22;
      const m = getTotalMass(player);
      cam.zoom = clamp(1.4 - Math.log10(m+1)*0.35, 0.34, 1.25);
    }

    function renderGrid(){
      const step = 60;
      const z = cam.zoom;
      const startX = (-cam.x*z + canvas.width/2) % (step*z);
      const startY = (-cam.y*z + canvas.height/2) % (step*z);
      ctx.strokeStyle = '#d4e0f8';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x=startX; x<canvas.width; x += step*z){ ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); }
      for (let y=startY; y<canvas.height; y += step*z){ ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
      ctx.stroke();
    }

    function toScreen(x,y){ return {x:(x-cam.x)*cam.zoom + canvas.width/2, y:(y-cam.y)*cam.zoom + canvas.height/2}; }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      renderGrid();
      const bounds = [{x:0,y:0},{x:WORLD,y:0},{x:WORLD,y:WORLD},{x:0,y:WORLD}].map(p=>toScreen(p.x,p.y));
      ctx.strokeStyle = '#93b4ea'; ctx.lineWidth = 4; ctx.beginPath();
      ctx.moveTo(bounds[0].x,bounds[0].y);
      for(let i=1;i<bounds.length;i++) ctx.lineTo(bounds[i].x,bounds[i].y);
      ctx.closePath(); ctx.stroke();

      for (const f of foods){ const s=toScreen(f.x,f.y); ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(s.x,s.y,3.2*cam.zoom,0,Math.PI*2); ctx.fill(); }
      for (const v of viruses){
        const s=toScreen(v.x,v.y), r=v.r*cam.zoom;
        ctx.fillStyle='#22c55e'; ctx.strokeStyle='#15803d'; ctx.lineWidth=2;
        ctx.beginPath();
        for(let i=0;i<24;i++){
          const a=Math.PI*2*i/24;
          const rr=r*(i%2?0.88:1.06);
          const x=s.x+Math.cos(a)*rr, y=s.y+Math.sin(a)*rr;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
      }
      for (const e of pellets){ const s=toScreen(e.x,e.y); ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(s.x,s.y,4*cam.zoom,0,Math.PI*2); ctx.fill(); }

      const all=[...bots, player];
      all.sort((a,b)=>getTotalMass(a)-getTotalMass(b));
      for (const c of all){
        for (const p of c.pieces){
          const s=toScreen(p.x,p.y), r=radiusFromMass(p.mass)*cam.zoom;
          const g=ctx.createRadialGradient(s.x-r*0.35,s.y-r*0.35,r*0.2,s.x,s.y,r);
          g.addColorStop(0,'#ffffff99'); g.addColorStop(1,c.color);
          ctx.fillStyle=g; ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.fill();
          if (c.human){
            ctx.strokeStyle = '#ffffffcc';
            ctx.lineWidth = Math.max(2, r * 0.08);
            ctx.beginPath();
            ctx.arc(s.x, s.y, r + Math.max(3, r * 0.05), 0, Math.PI * 2);
            ctx.stroke();
          }
          if (r > 14 || c.human){
            ctx.fillStyle='white'; ctx.textAlign='center';
            ctx.font=`${Math.max(11, r*0.24)}px Inter, sans-serif`;
            ctx.fillText(c.human ? 'You' : c.name, s.x, s.y-r*0.03);
            ctx.font=`${Math.max(10, r*0.2)}px Inter, sans-serif`;
            ctx.fillText(Math.floor(p.mass), s.x, s.y+r*0.28);
          }
        }
      }
    }

    function ui(){
      const pm = getTotalMass(player);
      massEl.textContent = Math.floor(pm);
      if (pm > best) { best = pm; localStorage.setItem('cellarena_best', best.toFixed(1)); bestEl.textContent = Math.floor(best); }
      const ranking = [player, ...bots].map(c=>({name:c.name, mass:getTotalMass(c)})).sort((a,b)=>b.mass-a.mass);
      const rank = ranking.findIndex(r=>r.name==='You')+1;
      rankEl.textContent = rank ? `${rank}/${ranking.length}` : '-';
      boardEl.innerHTML = ranking.slice(0,8).map(r=>`<li>${r.name} — ${Math.floor(r.mass)}</li>`).join('');
    }

    function loop(ts){
      if (over) return;
      const dt = Math.min(0.033, (ts-last)/1000); last = ts;
      updatePlayerTarget();
      stepCell(player, dt);
      stepBots(dt);
      stepPellets(dt);
      eatPhase();
      computeCamera();
      draw();
      ui();
      bots = bots.filter(b=>b.pieces.length);
      if (!player.pieces.length){
        over = true;
        finalEl.textContent = `You were absorbed. Best mass this run: ${Math.floor(best)}.`;
        overlay.style.display = 'flex';
        return;
      }
      if (bots.length < BOT_COUNT){
        bots.push(createCell(`Bot ${Math.floor(rand(50,999))}`, rand(80,WORLD-80), rand(80,WORLD-80), rand(9,18), `hsl(${rand(0,360)} 72% 60%)`));
      }
      requestAnimationFrame(loop);
    }

    function size(){
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(innerWidth*dpr);
      canvas.height = Math.floor(innerHeight*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    addEventListener('resize', size, {passive:true});
    addEventListener('orientationchange', ()=>setTimeout(size, 120), {passive:true});
    size();

    ['gesturestart', 'gesturechange', 'gestureend'].forEach(type => {
      document.addEventListener(type, e => e.preventDefault(), {passive:false});
    });

    function normStick(clientX, clientY){
      const r = stickEl.getBoundingClientRect();
      stick.cx = r.left + r.width/2; stick.cy = r.top + r.height/2;
      const max = r.width*0.35;
      let dx = clientX-stick.cx, dy = clientY-stick.cy;
      const len = Math.hypot(dx,dy);
      if (len>max){ dx*=max/len; dy*=max/len; }
      stick.dx = dx/max; stick.dy = dy/max;
      knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    stickEl.addEventListener('pointerdown', e=>{ stick.active=true; stick.id=e.pointerId; stickEl.setPointerCapture(e.pointerId); normStick(e.clientX,e.clientY); });
    stickEl.addEventListener('pointermove', e=>{ if(!stick.active||e.pointerId!==stick.id) return; normStick(e.clientX,e.clientY); });
    const endStick = e=>{ if(!stick.active||e.pointerId!==stick.id) return; stick.active=false; stick.dx=0; stick.dy=0; knob.style.transform='translate(-50%,-50%)'; };
    stickEl.addEventListener('pointerup', endStick);
    stickEl.addEventListener('pointercancel', endStick);

    document.getElementById('splitBtn').addEventListener('click', ()=>splitCell(player));
    document.getElementById('ejectBtn').addEventListener('click', ()=>ejectMass(player));
    document.getElementById('restartBtn').addEventListener('click', resetGame);

    addEventListener('keydown', e=>{
      if (e.code==='Space') splitCell(player);
      if (e.code==='KeyW') ejectMass(player);
    });

    document.body.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

    resetGame();
  </script>
</body>
</html>
